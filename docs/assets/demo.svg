<svg xmlns="http://www.w3.org/2000/svg" width="760" height="420" viewBox="0 0 760 420" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <rect width="760" height="420" rx="10" fill="#0d1117"/>
  <rect width="760" height="34" rx="10" fill="#161b22"/>
  <circle cx="20" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="17" r="6" fill="#febc2e"/>
  <circle cx="60" cy="17" r="6" fill="#28c840"/>
  <text x="380" y="21" fill="#8b949e" text-anchor="middle">randspy — find the entropy before it flakes</text>

  <text x="24" y="64" fill="#7ee787">$ randspy run examples/checkout.js</text>
  <text x="24" y="88" fill="#8b949e">order ord_rlingacf (USD) plugins: audit.js, metrics.js, webhook.js</text>

  <text x="24" y="120" fill="#c9d1d9">randspy: <tspan fill="#d29922">4 nondeterministic read(s)</tspan> from 4 site(s) — time 1 · random 1 · env 1 · order 1</text>

  <text x="24" y="152" fill="#c9d1d9">  <tspan fill="#f85149">RANDOM</tspan>  ×1  Math.random()         <tspan fill="#79c0ff">examples/checkout.js:11:26</tspan></text>
  <text x="24" y="174" fill="#c9d1d9">  <tspan fill="#d29922">TIME</tspan>    ×1  Date.now()            <tspan fill="#79c0ff">examples/checkout.js:12:26</tspan></text>
  <text x="24" y="196" fill="#c9d1d9">  <tspan fill="#a5d6ff">ENV</tspan>     ×1  process.env.CURRENCY  <tspan fill="#79c0ff">examples/checkout.js:13:32</tspan></text>
  <text x="24" y="218" fill="#c9d1d9">  <tspan fill="#bc8cff">ORDER</tspan>   ×1  fs.readdirSync()      <tspan fill="#79c0ff">examples/checkout.js:19:13</tspan></text>

  <text x="24" y="252" fill="#8b949e">  hint(time): freeze the clock — mock timers or an injected now()</text>
  <text x="24" y="272" fill="#8b949e">  hint(random): inject a seeded PRNG, or stub Math.random in test setup</text>
  <text x="24" y="292" fill="#8b949e">  hint(env): pass required variables explicitly in test setup</text>
  <text x="24" y="312" fill="#8b949e">  hint(order): sort directory listings — readdir order is filesystem-dependent</text>

  <text x="24" y="346" fill="#c9d1d9">randspy: <tspan fill="#f85149">FAIL</tspan> — 4 read(s) match fail-on=any  <tspan fill="#8b949e">exit 1</tspan></text>

  <text x="24" y="384" fill="#7ee787">$ randspy run examples/deterministic.js</text>
  <text x="24" y="404" fill="#c9d1d9">randspy: <tspan fill="#3fb950">OK</tspan> — no nondeterministic reads (fail-on=any)  <tspan fill="#8b949e">exit 0</tspan></text>
</svg>
